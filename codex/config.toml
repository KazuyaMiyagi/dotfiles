[mcp_servers.terraform]
command = "docker"
args = ["run", "-i", "--rm", "hashicorp/terraform-mcp-server"]

[mcp_servers.datadog]
url = "https://mcp.datadoghq.com/api/unstable/mcp-server/mcp"

[mcp_servers.aws-mcp]
command = "uvx"
args = [
  "mcp-proxy-for-aws@latest",
  "https://aws-mcp.us-east-1.api.aws/mcp",
  "--metadata",
  "AWS_REGION=ap-northeast-1",
]
env_vars = [
  "AWS_PROFILE",
  "AWS_DEFAULT_PROFILE",
  "AWS_REGION",
  "AWS_DEFAULT_REGION",
]
startup_timeout_sec = 60

[mcp_servers.iam-mcp-server]
command = "uvx"
args = ["awslabs.iam-mcp-server@latest"]
env_vars = [
  "AWS_PROFILE",
  "AWS_DEFAULT_PROFILE",
  "AWS_REGION",
  "AWS_DEFAULT_REGION",
]
startup_timeout_sec = 60

[mcp_servers.cloudwatch-mcp-server]
command = "uvx"
args = ["awslabs.cloudwatch-mcp-server@latest"]
env_vars = [
  "AWS_PROFILE",
  "AWS_DEFAULT_PROFILE",
  "AWS_REGION",
  "AWS_DEFAULT_REGION",
]
startup_timeout_sec = 60

[mcp_servers.ecs-mcp-server]
command = "uvx"
args = ["--from", "awslabs.ecs-mcp-server@latest", "ecs-mcp-server"]
env_vars = [
  "AWS_PROFILE",
  "AWS_DEFAULT_PROFILE",
  "AWS_REGION",
  "AWS_DEFAULT_REGION",
]
startup_timeout_sec = 60

[mcp_servers.aws-pricing-mcp-server]
command = "uvx"
args = ["awslabs.aws-pricing-mcp-server@latest"]
env_vars = [
  "AWS_PROFILE",
  "AWS_DEFAULT_PROFILE",
  "AWS_REGION",
  "AWS_DEFAULT_REGION",
]
startup_timeout_sec = 60

[mcp_servers.billing-cost-management-mcp-server]
command = "uvx"
args = ["awslabs.billing-cost-management-mcp-server@latest"]
env_vars = [
  "AWS_PROFILE",
  "AWS_DEFAULT_PROFILE",
  "AWS_REGION",
  "AWS_DEFAULT_REGION",
]
startup_timeout_sec = 60
